name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          APP_KEYS: test-key-1,test-key-2
          API_TOKEN_SALT: test-salt
          ADMIN_JWT_SECRET: test-secret
          TRANSFER_TOKEN_SALT: test-transfer
          JWT_SECRET: test-jwt
          ENCRYPTION_KEY: test-encryption
          NODE_ENV: test

      - name: Build coverage report
        if: always()
        run: node scripts/coverage-summary.js | tee coverage-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment coverage on PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- coverage-report -->';
            const report = fs.existsSync('coverage-report.md')
              ? fs.readFileSync('coverage-report.md', 'utf8')
              : '_No coverage report was generated._';
            const body = `${marker}\n${report}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
