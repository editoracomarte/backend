map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

map $http_x_real_ip $client_ip {
    default $http_x_real_ip;
    ''      $remote_addr;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;
    resolver 127.0.0.11 valid=10s ipv6=off;

    location = /admin/register-admin {
        return 404;
    }

    # ------------------------------------------------------------------
    # ATENCAO: esta lista sao os prefixos que o Strapi monta NA RAIZ.
    # Ela NAO e arbitraria -- cada plugin instalado vira um prefixo novo
    # (register-routes.js monta cada plugin em /${pluginName}).
    #
    # >> INSTALAR UM PLUGIN NOVO NO STRAPI QUEBRA O PAINEL EM PRODUCAO <<
    #    ate que o prefixo dele entre nesta linha.
    #
    # Sintoma: o painel carrega mas as telas quebram, e o DevTools mostra
    #          XHR recebendo HTML (o index.html do SPA) no lugar de JSON.
    # Conserto: rodar `npx strapi routes:list` e adicionar o prefixo aqui.
    # ------------------------------------------------------------------
    location ~ ^/(api|uploads|admin|content-manager|content-type-builder|content-releases|upload|i18n|users-permissions|review-workflows|email|cloud)(/|$) {
        set $strapi_upstream http://strapi:1337;
        proxy_pass $strapi_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $client_ip;
        proxy_set_header X-Forwarded-For   $client_ip;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location / {
        root /srv/frontend;
        try_files $uri $uri/ /index.html;
    }
}
